<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancel Registration</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
    .card { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
    h2 { color: #d32f2f; }
    .info-box { background: #fffde7; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #fbc02d; font-size: 14px; }
    .del-btn { width: 100%; padding: 14px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .del-btn:disabled { background: #ccc; }
    #loader { display: none; margin: 10px 0; color: #666; font-style: italic; }
  </style>
</head>
<body>

<div class="card" id="main-card">
  <div id="confirm-ui">
    <h2>Cancel Registration?</h2>
    <p>Are you sure you want to cancel the following registration?</p>
    
    <div class="info-box" id="user-info">
      Loading details...
    </div>

    <button class="del-btn" id="btn-delete" onclick="executeDeletion()" disabled>Confirm Cancellation</button>
    <div id="loader">Processing... please wait...</div>
  </div>

  <div id="success-ui" style="display:none;">
    <h2 style="color: #2e7d32;">Successfully Cancelled</h2>
    <p>The registration has been removed and the seat has been released.</p>
    <button class="del-btn" style="background:#1a237e;" onclick="window.close()">Close Window</button>
  </div>
</div>

<script>
  // 1. CONFIGURATION (Use your exact same config from index.html)
  const firebaseConfig = {
    databaseURL: "YOUR_FIREBASE_DATABASE_URL",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const urlParams = new URLSearchParams(window.location.search);
  const eventId = urlParams.get('id');
  const regId = urlParams.get('regId');

  // 2. FETCH DETAILS ON LOAD
  window.onload = async () => {
    if (!eventId || !regId) {
      document.getElementById('user-info').innerHTML = "Invalid Link.";
      return;
    }

    try {
      const snapshot = await db.ref(`registrations/${eventId}/${regId}`).once('value');
      const data = snapshot.val();
      if (data) {
        document.getElementById('user-info').innerHTML = `
          <strong>Name:</strong> ${data.full_name}<br>
          <strong>ID:</strong> ${regId}
        `;
        document.getElementById('btn-delete').disabled = false;
      } else {
        document.getElementById('user-info').innerHTML = "Registration not found or already cancelled.";
      }
    } catch (e) {
      console.error(e);
    }
  };

  // 3. EXECUTION LOGIC (Your Blueprint)
  async function executeDeletion() {
    document.getElementById('btn-delete').disabled = true;
    document.getElementById('loader').style.display = 'block';

    try {
      // Step A: Counter Transaction (-1)
      const counterRef = db.ref('counters/' + eventId);
      await counterRef.transaction((current) => (current || 1) - 1);

      // Step B: Soft Delete[cite: 2]
      await db.ref(`registrations/${eventId}/${regId}`).update({
        registration_status: "CANCELLED",
        cancelled_at: new Date().toLocaleString()
      });

      document.getElementById('confirm-ui').style.display = 'none';
      document.getElementById('success-ui').style.display = 'block';
    } catch (error) {
      alert("Error during cancellation. Please try again.");
      document.getElementById('btn-delete').disabled = false;
    }
  }
</script>
</body>
</html>
