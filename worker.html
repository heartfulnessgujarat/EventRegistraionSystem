<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>
    WhatsApp Worker
  </title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<h2>
  WhatsApp Worker Running...
</h2>

<script>

  // =====================================================
  // FIREBASE CONFIG
  // =====================================================

  const firebaseConfig = {

    databaseURL:
      "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app"

  };

  firebase.initializeApp(firebaseConfig);

  const db =
    firebase.database();

  // =====================================================
  // ASSISTRO API KEY
  // =====================================================

  const ASSISTRO_API_KEY = 

    "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJodHRwczovL2FwcC5hc3Npc3Ryby5jby9wbGFuL3dhcHVzaC1wbHVzL2N1c3RvbSIsImlhdCI6MTc0ODM1MzA1MCwiZXhwIjoxNzc5ODg5MDUwLCJuYmYiOjE3NDgzNTMwNTAsImp0aSI6InhMTjFoSmNyS1hHd1U1UnQiLCJzdWIiOiIyNDc2IiwicHJ2IjoiMjNiZDVjODk0OWY2MDBhZGIzOWU3MDFjNDAwODcyZGI3YTU5NzZmNyIsInVzZXJfY29tcGFueV9pZCI6ODczLCJ1c2VyX3B1c2hfcGx1c193ZWJob29rX2lkIjo3MDIsImN1cnJlbnRfd2ViaG9va19pZCI6MTg3LCJwcm9kdWN0X2lkIjo1LCJpbnRlZ3JhdGlvbiI6ImN1c3RvbSJ9.qIPA-YPf0ca3H-uSH71J26eLSJ-YUF69jUzdbJj4d_w";

  // =====================================================
  // START WORKER
  // =====================================================

  console.log(
    "WhatsApp Worker Started..."
  );

  db.ref("whatsapp_queue")

    .orderByChild("status")

    .equalTo("PENDING")

    .on(

      "child_added",

      async function(snapshot) {

        const data =
          snapshot.val();

        const key =
          snapshot.key;

        console.log(
          "NEW QUEUE:",
          key,
          data
        );

        try {

          // =====================================================
          // SEND TO ASSISTRO
          // =====================================================

          const response =

            await fetch(

              "https://app.assistro.co/api/v1/wapushplus/single/message",

              {

                method:
                  "POST",

                headers: {

                  "Content-Type":
                    "application/json",

                  "Authorization":
                    "Bearer " + ASSISTRO_API_KEY

                },

                body:
                  JSON.stringify({

                    msgs: [

                      {

                        number:
                          "91" + data.mobile,

                        message:

                          "YOUR TICKET NUMBER = " +

                          data.ticket +

                          " AGAINST REGISTRATION FOR " +

                          data.eventTitle

                      }

                    ]

                  })

              }

            );

          const result =
            await response.text();

          console.log(
            "ASSISTRO RESPONSE:",
            result
          );

          // =====================================================
          // MARK SENT
          // =====================================================

          await db.ref(

            "whatsapp_queue/" + key

          ).update({

            status:
              "SENT",

            sent_at:
              Date.now(),

            response:
              result

          });

          console.log(
            "MESSAGE SENT:",
            key
          );

        }

        catch(error) {

          console.error(
            "FAILED:",
            error
          );

          // =====================================================
          // MARK FAILED
          // =====================================================

          await db.ref(

            "whatsapp_queue/" + key

          ).update({

            status:
              "FAILED",

            error:
              error.toString()

          });

        }

      }

    );

</script>

</body>

</html>
