<script>
  // 1. CONFIG & GLOBALS
  const firebaseConfig = { databaseURL: "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const urlParams = new URLSearchParams(window.location.search);
  const eventId = (urlParams.get('id') || 'EVT001').toUpperCase();

  let fieldRules = [], masterData = [], locData = [], eventConfig = {};
  let verificationStates = { email: false, mobile: false };
  let generatedCodes = { email: "", mobile: "" };
  let originalValues = {};

  // 2. INITIALIZATION
  window.onload = init;

  async function init() {
    try {
      const configSnap = await db.ref('config/eventConfig').once('value');
      const allConfigs = configSnap.val() || {};
      eventConfig = allConfigs[eventId] || Object.values(allConfigs).find(c => String(c.event_id).toUpperCase() === eventId) || { title: "Registration" };
      
      document.getElementById('title').innerHTML = eventConfig.title || "Registration";
      document.getElementById('subtitle').innerHTML = eventConfig.subtitle || "";
      
      const rulesSnap = await db.ref('config/fieldRules').once('value');
      fieldRules = Object.values(rulesSnap.val() || {}).filter(r => String(r.event_id).toUpperCase() === eventId);
      
      renderForm();

      document.getElementById('loading-init').style.display = 'none';
      document.getElementById('form-content').style.display = 'block';

      checkAllValidations();
    } catch (e) {
      console.error("Init Error:", e);
      document.getElementById('loading-init').innerHTML = "<h2>Error Loading Form</h2>";
    }
  }

  // 3. CORE FORM RENDERING
  function renderForm() {
    const container = document.getElementById('dynamic-fields');
    container.innerHTML = '';
    
    fieldRules.forEach(r => {
      const div = document.createElement('div');
      div.className = 'field-container';
      div.id = `cont-${r.field_id}`;
      div.style.display = (r.initial_state === 'Visible') ? 'block' : 'none';
      
      const labelText = r.display_label || r.Display_Label || r.field_id;
      const isVerifyField = (r.field_id === 'email' || r.field_id === 'mobile');
      
      const verificationHtml = isVerifyField ? `
        <div id="v-wrapper-${r.field_id}" style="display:none;">
          <button id="vbtn-${r.field_id}" type="button" class="primary-btn" 
                  style="background:#f3cc12; color:black; margin-top:10px; font-size:13px;" 
                  onclick="triggerSendCode('${r.field_id}')">
            Click here to verify change
          </button>
        </div>
        <div id="vgroup-${r.field_id}" style="display:none; gap:10px; margin-top:10px;">
          <input type="text" id="vcode-${r.field_id}" placeholder="Enter 6-digit code" style="flex:1;">
          <button type="button" class="primary-btn" style="width:auto; margin:0;" 
                  onclick="verifyCodeInput('${r.field_id}')">Verify</button>
        </div>
        <div id="vstatus-${r.field_id}" style="color:green; font-weight:bold; margin-top:5px; font-size:14px;"></div>
      ` : '';

      div.innerHTML = `
        <label>${labelText}</label>
        <input type="text" id="inp-${r.field_id}" 
               oninput="handleSearch('${r.field_id}', this.value); checkAllValidations();"
               disabled autocomplete="off">
        ${verificationHtml}
        <div class="error-msg-text" id="err-${r.field_id}"></div>
        <div class="help-text" id="help-${r.field_id}">${r.field_help_text || ''}</div>
        <div class="dropdown" id="res-${r.field_id}"></div>`;
        
      container.appendChild(div);
      
      if (r.field_id === 'full_name') {
        div.style.display = 'block';
        document.getElementById('inp-full_name').disabled = false;
      }
    });
  }

  // 4. SEARCH & VALIDATION
  async function handleSearch(fId, val) {
    const resDiv = document.getElementById(`res-${fId}`);
    if (val.length < 3) { resDiv.style.display = 'none'; return; }
    if (fId === 'full_name') {
      if (masterData.length === 0) { const snap = await db.ref('masterData').once('value'); masterData = Object.values(snap.val() || {}); }
      renderDropdown(resDiv, masterData.filter(x => x.full_name?.toLowerCase().includes(val.toLowerCase())).slice(0, 8), 'name');
    } else if (fId === 'centre') {
      if (locData.length === 0) { const snap = await db.ref('config/locations').once('value'); locData = Object.values(snap.val() || {}); }
      renderDropdown(resDiv, locData.filter(x => x.centre?.toLowerCase().includes(val.toLowerCase())).slice(0, 8), 'loc');
    }
  }

  function renderDropdown(div, list, type) {
    div.innerHTML = '';
    if (list.length > 0) {
      div.style.display = 'block';
      list.forEach(item => {
        const d = document.createElement('div');
        d.className = 'item';
        d.textContent = type === 'loc' ? item.centre : item.full_name;
        d.onclick = () => type === 'loc' ? selectLocation(item) : selectParticipant(item);
        div.appendChild(d);
      });
    }
  }

  function selectParticipant(p) {
    fieldRules.forEach(r => {
      const el = document.getElementById(`inp-${r.field_id}`);
      if (el) { 
        el.value = p[r.field_id] || ''; 
        originalValues[r.field_id] = el.value;
        if (r.field_id === 'full_name') el.disabled = true; 
        if (r.initial_state !== 'Hidden') {
          document.getElementById(`cont-${r.field_id}`).style.display = 'block';
        }
      }
    });
    document.getElementById('res-full_name').style.display = 'none';
    document.getElementById('btns-start').style.display = 'flex';
    checkAllValidations();
  }

  function selectLocation(l) {
    document.getElementById('inp-centre').value = l.centre;
    if(document.getElementById('inp-district')) document.getElementById('inp-district').value = l.district || '';
    if(document.getElementById('inp-zone')) document.getElementById('inp-zone').value = l.zone || '';
    document.getElementById('res-centre').style.display = 'none';
    checkAllValidations();
  }

  function enableEdit() {
    document.getElementById('btns-start').style.display = 'none';
    document.getElementById('btn-update').style.display = 'block';
    fieldRules.forEach(r => {
      const el = document.getElementById(`inp-${r.field_id}`);
      if (document.getElementById(`help-${r.field_id}`)) document.getElementById(`help-${r.field_id}`).style.display = 'block';
      if (r.edit_behavior && r.edit_behavior.includes("Editable")) el.disabled = false;
    });
  }

  function validateField(id, value, rule) {
    if (!rule || rule === 'NULL') return true;
    const val = value.trim();
    if (val === "") return false;
    if (rule === 'MOB') return /^[6-9]\d{9}$/.test(val);
    if (rule === 'PIN') return /^\d{6}$/.test(val);
    if (rule === 'EMAIL') return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
    if (rule.startsWith('NUM:')) {
      const range = rule.replace('NUM:', '').split('TO');
      const num = parseInt(val);
      return !isNaN(num) && num >= parseInt(range[0]) && num <= parseInt(range[1]);
    }
    return true;
  }

  function checkAllValidations() {
    if (!fieldRules || fieldRules.length === 0) return; 
    let allValid = true;
    let verificationPending = false;

    fieldRules.forEach(r => {
      const input = document.getElementById(`inp-${r.field_id}`);
      const container = document.getElementById(`cont-${r.field_id}`);
      if (container && container.style.display === 'block' && input) {
        let isValid = validateField(r.field_id, input.value, r.field_validation);
        input.style.border = isValid ? '1px solid #ced4da' : '2px solid red';
        if (!isValid) allValid = false;

        if (r.field_id === 'email' || r.field_id === 'mobile') {
          const wrapper = document.getElementById(`v-wrapper-${r.field_id}`);
          const isEditable = !input.disabled;
          const isChanged = (input.value !== originalValues[r.field_id]);
          const isVerified = verificationStates[r.field_id];

          if (isEditable && isChanged && !isVerified) {
            if (isValid) wrapper.style.display = 'block';
            verificationPending = true; 
          } else if (wrapper) {
            wrapper.style.display = 'none';
          }
        }
      }
    });

    const updBtn = document.getElementById('btn-update');
    const regBtn = document.getElementById('btn-register');
    [updBtn, regBtn].forEach(btn => {
      if (btn) {
        const canSubmit = allValid && !verificationPending;
        btn.disabled = !canSubmit;
        btn.style.opacity = canSubmit ? "1" : "0.5";
      }
    });
  }

  async function triggerSendCode(fId) {
    const inputVal = document.getElementById(`inp-${fId}`).value.trim();
    const emailField = document.getElementById('inp-email').value.trim();
    const targetEmail = (fId === 'email') ? inputVal : emailField;
    
    if (!targetEmail) { alert("Valid email required."); return; }
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    generatedCodes[fId] = code;

    alert("Code sent to " + targetEmail);
    document.getElementById(`v-wrapper-${fId}`).style.display = 'none'; 
    document.getElementById(`vgroup-${fId}`).style.display = 'flex';

    const scriptUrl = "https://script.google.com/macros/s/AKfycbwwF8ZbE_Mp3TfcRIIK3IGn9bMw7MIbrURkqzLlfkYWU5twkhMYiDYeh_DPiBt2yTyu/exec";
    fetch(`${scriptUrl}?action=verifyExternal&email=${encodeURIComponent(targetEmail)}&code=${code}&fId=${fId.toUpperCase()}`, { mode: 'no-cors' });
  }

  function verifyCodeInput(fId) {
    if (document.getElementById(`vcode-${fId}`).value.trim() === generatedCodes[fId]) {
      verificationStates[fId] = true;
      document.getElementById(`vstatus-${fId}`).innerHTML = "✅ Verified";
      document.getElementById(`vgroup-${fId}`).style.display = 'none';
      checkAllValidations(); 
    } else {
      alert("Incorrect code.");
    }
  }

  async function submitData() {
    document.getElementById('form-content').style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    
    const now = new Date();
    const regId = `${eventId.toUpperCase()}REG${now.toISOString().replace(/[-T:Z.]/g, "").slice(0, 10)}${Math.floor(100 + Math.random() * 900)}`;
    const payload = { registration_id: regId, event_id: eventId, timestamp: now.toISOString() };
    fieldRules.forEach(r => { payload[r.field_id] = document.getElementById(`inp-${r.field_id}`).value; });

    try {
      await db.ref('registrations/' + regId).set(payload);
      const scriptUrl = "https://script.google.com/macros/s/AKfycbwkU3kI8yzR2kENRStLaX1i32roJdVBjm8yQcW_b9WI35OL-7qCLlKstTrSxQ8mM69iqw/exec"; 
      fetch(`${scriptUrl}?action=sendEmail&regId=${regId}&eventId=${eventId}`, { mode: 'no-cors' });
      
      const snap = await db.ref(`htmlStorage/${eventId}/thank`).once('value');
      document.getElementById('app').innerHTML = snap.val() ? `<div style="width:100%;">${snap.val()}</div>` : `<h2>Registration Successful! ID: ${regId}</h2>`;
    } catch (e) {
      alert("Submission Error.");
      document.getElementById('form-content').style.display = 'block';
      document.getElementById('loader').style.display = 'none';
    }
  }
</script>
</body>
</html>
