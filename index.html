<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration 2026</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
    .card { width: 100%; max-width: 450px; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { color: #1a237e; margin-bottom: 5px; text-align: center; }
    .subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .field-container { margin-bottom: 20px; position: relative; }
    label { display: block; font-weight: 700; font-size: 13px; color: #1a237e; margin-bottom: 6px; }
    input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 16px; width: 100%; }
    input:disabled { background: #f8f9fa; color: #6c757d; }
    
    /* Error Message - Pushed down to avoid overlap */
    .error-msg-text { color: #d32f2f; font-size: 11px; margin-top: 5px; font-weight: bold; display: none; width: 100%; }
    
    .primary-btn { width: 100%; padding: 15px; background: #1a237e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    /* Verification UI - Improved Layout */
    .verify-area { margin-top: 8px; }
    .verify-btn { background: #fbc02d; color: #000; border: none; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; display: none; width: 100%; }
    
    .v-input-group { display: none; margin-top: 10px; gap: 8px; background: #fff9c4; padding: 10px; border-radius: 8px; border: 1px solid #fbc02d; align-items: center; }
    .v-input { flex: 1; padding: 8px !important; text-align: center; letter-spacing: 2px; font-weight: bold; background: white !important; min-width: 0; }
    .v-confirm-btn { background: #1a237e; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-size: 11px; cursor: pointer; white-space: nowrap; }
    
    .v-success { color: #2e7d32; font-size: 13px; font-weight: bold; display: none; margin-top: 8px; padding: 8px; border: 1px solid #2e7d32; border-radius: 4px; background: #e8f5e9; text-align: center; }

    .dropdown { border: 1px solid #ddd; max-height: 200px; overflow-y: auto; background: white; position: absolute; width: 100%; z-index: 1000; display: none; border-radius: 0 0 8px 8px; }
    .item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
    .item:hover { background: #e8eaf6; }
    #loader, #loading-init { text-align: center; padding: 40px; color: #1a237e; }
  </style>
</head>
<body>
<div class="card" id="app">
  <div id="loading-init"><h2>Loading form...</h2></div>
  <div id="form-content" style="display:none;">
    <h2 id="title"></h2>
    <p class="subtitle" id="subtitle"></p>
    <div id="dynamic-fields"></div>

    <div id="btns-start" style="display:none; flex-direction:column; gap:10px;">
      <button id="btn-register" class="primary-btn" disabled onclick="submitData()">Confirm Registration</button>
      <button type="button" class="primary-btn" style="background:#455a64;" onclick="enableEdit()">I want to edit my details</button>
    </div>

    <button id="btn-update" class="primary-btn" style="display:none;" disabled onclick="submitData()">Update & Register</button>
  </div>
  <div id="loader" style="display:none;"><h3>Processing...</h3></div>
</div>

<script>
  const firebaseConfig = { databaseURL: "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const urlParams = new URLSearchParams(window.location.search);
  const eventId = (urlParams.get('id') || 'EVT001').toUpperCase();
  
  let fieldRules = [], masterData = [];
  let originalValues = { mobile: '', email: '' }; 
  let verificationState = { mobile: true, email: true }; 
  let generatedCode = null; 
  let isEditModeActive = false; 

  async function init() {
    try {
      const configSnap = await db.ref('config/eventConfig').once('value');
      const allConfigs = configSnap.val() || {};
      const eventConfig = allConfigs[eventId] || { title: "Registration" };
      document.getElementById('title').innerText = eventConfig.title;
      document.getElementById('subtitle').innerText = eventConfig.subtitle || "";
      const rulesSnap = await db.ref('config/fieldRules').once('value');
      fieldRules = Object.values(rulesSnap.val() || {}).filter(r => String(r.event_id).toUpperCase() === eventId);
      renderForm();
      document.getElementById('loading-init').style.display = 'none';
      document.getElementById('form-content').style.display = 'block';
    } catch (e) { console.error(e); }
  }

  function renderForm() {
    const container = document.getElementById('dynamic-fields');
    container.innerHTML = '';
    fieldRules.forEach(r => {
      const div = document.createElement('div');
      div.className = 'field-container';
      div.id = `cont-${r.field_id}`;
      div.style.display = (r.initial_state === 'Visible') ? 'block' : 'none';
      div.innerHTML = `
        <label>${r.display_label || r.field_id}</label>
        <input type="text" id="inp-${r.field_id}" oninput="handleInput('${r.field_id}', this.value)" disabled autocomplete="off">
        
        <div class="verify-area">
            <button id="vbtn-${r.field_id}" class="verify-btn" onclick="triggerSendCode('${r.field_id}')">Click here to Send Verification Code</button>
            <div id="vgroup-${r.field_id}" class="v-input-group">
              <input type="text" id="vcode-${r.field_id}" class="v-input" placeholder="Enter Verification Code" maxlength="6">
              <button type="button" class="v-confirm-btn" onclick="confirmCode('${r.field_id}')">Verify</button>
            </div>
            <div id="vsuccess-${r.field_id}" class="v-success">✓ Verified</div>
        </div>

        <div class="error-msg-text" id="err-${r.field_id}"></div>
        <div class="dropdown" id="res-${r.field_id}"></div>`;
      container.appendChild(div);
      if (r.field_id === 'full_name') { div.style.display = 'block'; document.getElementById('inp-full_name').disabled = false; }
    });
  }

  function handleInput(fId, val) {
    if(fId === 'full_name') handleSearch(val);
    checkAllValidations();
  }

  function selectParticipant(p) {
    isEditModeActive = false;
    originalValues = { mobile: String(p.mobile || '').trim(), email: String(p.email || '').trim() };
    verificationState = { mobile: true, email: true };
    fieldRules.forEach(r => {
      const el = document.getElementById(`inp-${r.field_id}`);
      if (el) { 
          el.value = p[r.field_id] || ''; 
          el.disabled = true; 
          document.getElementById(`vbtn-${r.field_id}`).style.display = 'none'; // Hide verify buttons on fresh load
          if (r.initial_state !== 'Hidden') document.getElementById(`cont-${r.field_id}`).style.display = 'block'; 
      }
    });
    document.getElementById('btns-start').style.display = 'flex';
    document.getElementById('btn-update').style.display = 'none';
    document.getElementById('res-full_name').style.display = 'none';
    checkAllValidations();
  }

  function enableEdit() {
    isEditModeActive = true;
    document.getElementById('btns-start').style.display = 'none';
    document.getElementById('btn-update').style.display = 'block';
    fieldRules.forEach(r => {
      const el = document.getElementById(`inp-${r.field_id}`);
      if (r.edit_behavior && r.edit_behavior.includes("Editable")) el.disabled = false;
    });
    checkAllValidations();
  }

  function checkAllValidations() {
    let allValid = true;
    fieldRules.forEach(r => {
      const input = document.getElementById(`inp-${r.field_id}`);
      const vBtn = document.getElementById(`vbtn-${r.field_id}`);
      if (input && document.getElementById(`cont-${r.field_id}`).style.display === 'block') {
        let val = input.value.trim();
        let isValid = validateField(r.field_id, val, r.field_validation);
        
        if (r.field_id === 'mobile' || r.field_id === 'email') {
           const isChanged = val !== originalValues[r.field_id];
           
           // TRIGGER LOGIC: Only show if Edit is on AND value is valid AND it's a complete entry (10 digits for mobile)
           let isComplete = (r.field_id === 'mobile') ? val.length === 10 : val.includes('@');
           
           if (isEditModeActive && isChanged && isValid && isComplete && verificationState[r.field_id] === true) {
               vBtn.style.display = 'block';
               verificationState[r.field_id] = false; 
           } else if (!isChanged || !isEditModeActive || verificationState[r.field_id] === "DONE" || !isComplete) {
               vBtn.style.display = 'none';
               if (!isChanged) verificationState[r.field_id] = true;
           }
        }

        if (!isValid && val !== "") { 
            document.getElementById(`err-${r.field_id}`).style.display = 'block';
            document.getElementById(`err-${r.field_id}`).innerText = "Invalid format";
            input.style.border = '2px solid red'; 
            allValid = false; 
        } else { 
            document.getElementById(`err-${r.field_id}`).style.display = 'none';
            input.style.border = '1px solid #ced4da'; 
        }
        if (!isValid) allValid = false;
      }
    });
    const isReady = allValid && verificationState.mobile !== false && verificationState.email !== false;
    document.getElementById('btn-update').disabled = !isReady;
    document.getElementById('btn-register').disabled = !allValid;
  }

  function triggerSendCode(fId) {
    generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
    const targetEmail = document.getElementById('inp-email').value;
    document.getElementById(`vbtn-${fId}`).innerText = "Sending...";
    
    // Silence the local alert and call the real script
    google.script.run.withSuccessHandler(() => {
        document.getElementById(`vbtn-${fId}`).style.display = 'none';
        document.getElementById(`vgroup-${fId}`).style.display = 'flex';
    }).sendVerificationEmail(targetEmail, generatedCode, fId.toUpperCase());
  }

  function confirmCode(fId) {
    const entered = document.getElementById(`vcode-${fId}`).value;
    if (entered === generatedCode) {
      verificationState[fId] = "DONE";
      document.getElementById(`vgroup-${fId}`).style.display = 'none';
      document.getElementById(`vsuccess-${fId}`).style.display = 'block';
      document.getElementById(`inp-${fId}`).disabled = true;
      checkAllValidations();
    } else { alert("Invalid Verification Code. Please check your email."); }
  }

  function validateField(id, value, rule) {
    if (!rule || rule === 'NULL') return true;
    const v = value.trim();
    if (v === "") return false;
    if (rule === 'MOB') return /^[6-9]\d{9}$/.test(v);
    if (rule === 'EMAIL') return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    return true;
  }

  async function handleSearch(val) {
    if (val.length < 3) return;
    if (masterData.length === 0) { const snap = await db.ref('masterData').once('value'); masterData = Object.values(snap.val() || {}); }
    const resDiv = document.getElementById('res-full_name');
    resDiv.innerHTML = ''; resDiv.style.display = 'block';
    masterData.filter(x => x.full_name?.toLowerCase().includes(val.toLowerCase())).slice(0,8).forEach(item => {
      const d = document.createElement('div'); d.className = 'item'; d.textContent = item.full_name;
      d.onclick = () => selectParticipant(item); resDiv.appendChild(d);
    });
  }

  async function submitData() {
    document.getElementById('form-content').style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    const regId = `${eventId}REG${Date.now()}`;
    const payload = { registration_id: regId, timestamp: new Date().toISOString() };
    fieldRules.forEach(r => { payload[r.field_id] = document.getElementById(`inp-${r.field_id}`).value; });
    await db.ref('registrations/' + regId).set(payload);
    document.getElementById('app').innerHTML = `<h2>Success!</h2><p>ID: ${regId}</p>`;
  }
  init();
</script>
</body>
</html>
