<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MERS - Multi Stage Registration</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
    .card { width: 100%; max-width: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; display: none; }
    .header-img { width: 100%; display: block; }
    .p-20 { padding: 20px; }
    h2, h3 { color: #1a237e; margin-top: 0; }
    .field-group { margin-bottom: 15px; text-align: left; position: relative; }
    label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
    input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .lookup-results { position: absolute; width: 100%; background: white; border: 1px solid #ddd; z-index: 100; max-height: 200px; overflow-y: auto; border-radius: 0 0 8px 8px; display: none; }
    .lookup-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
    .lookup-item:hover { background: #f0f2f5; }
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .btn-primary { background: #1a237e; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    #processing-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; z-index:9999; }
  </style>
</head>
<body>

<div id="processing-overlay"><div><strong>Loading MERS Engine...</strong></div></div>

<div id="screen-section1" class="card">
    <div id="header-container-1"></div>
    <div class="p-20">
        <h2 id="title-1">Registration</h2>
        <p id="subtitle-1" style="color:#666;"></p>
        <div id="fields-section1"></div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="navigateTo('Section2')">Next: Logistics →</button>
        </div>
    </div>
</div>

<div id="screen-section2" class="card">
    <div id="header-container-2"></div>
    <div class="p-20">
        <h3 id="title-section2">Logistics Details</h3>
        <div id="fields-section2"></div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="navigateTo('Section1')">← Back</button>
            <button class="btn btn-primary" onclick="navigateTo('Section3')">Next: Travel →</button>
        </div>
    </div>
</div>

<div id="screen-section3" class="card">
    <div id="header-container-3"></div>
    <div class="p-20">
        <h3 id="title-section3">Travel Information</h3>
        <div id="fields-section3"></div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="navigateTo('Section2')">← Back</button>
            <button class="btn btn-primary" onclick="finalRegister()">Complete Registration</button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = { databaseURL: "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let eventId = new URLSearchParams(window.location.search).get('id') || "EVT001";
let masterData = [];
let fieldRules = [];
let moreSections = [];
let eventConfig = {};

// --- INITIALIZATION ---
async function init() {
    try {
        const [configSnap, rulesSnap, masterSnap, sectionsSnap] = await Promise.all([
            db.ref(`events/${eventId}/config`).once('value'),
            db.ref(`events/${eventId}/rules`).once('value'),
            db.ref(`masters/Master_Internal_DB`).once('value'),
            db.ref(`events/${eventId}/sections`).once('value')
        ]);

        eventConfig = configSnap.val() || {};
        fieldRules = rulesSnap.val() || [];
        moreSections = sectionsSnap.val() || [];

        // Protection: Ensure Master Data is an Array
        const rawMaster = masterSnap.val();
        masterData = (rawMaster && !Array.isArray(rawMaster)) ? Object.values(rawMaster) : (rawMaster || []);

        renderUI();
        document.getElementById('processing-overlay').style.display = 'none';
        navigateTo('Section1'); // Start at Section 1
    } catch (e) {
        console.error("Init Error:", e);
        alert("Failed to load registration data.");
    }
}

function renderUI() {
    // Set Titles
    document.getElementById('title-1').innerText = eventConfig.event_name || "Registration";
    document.getElementById('subtitle-1').innerText = eventConfig.event_description || "";
    
    // Set Header Images
    const imgHtml = eventConfig.header_image_url ? `<img src="${eventConfig.header_image_url}" class="header-img">` : "";
    document.getElementById('header-container-1').innerHTML = imgHtml;
    document.getElementById('header-container-2').innerHTML = imgHtml;
    document.getElementById('header-container-3').innerHTML = imgHtml;

    // Build Fields for each section
    buildFields('Section1', 'fields-section1');
    buildFields('Section2', 'fields-section2');
    buildFields('Section3', 'fields-section3');
}

function buildFields(sectionKey, containerId) {
    const container = document.getElementById(containerId);
    const rules = fieldRules.filter(r => r.section_number === sectionKey);
    
    container.innerHTML = rules.map(r => `
        <div class="field-group">
            <label>${r.display_label || r.field_id}</label>
            <input type="text" id="inp-${r.field_id}" 
                   placeholder="${r.field_help_text || ''}"
                   oninput="handleLookup('${r.field_id}', this.value, '${r.lookup_tab || ''}', '${r.lookup_column || ''}')"
                   onclick="handleLookup('${r.field_id}', this.value, '${r.lookup_tab || ''}', '${r.lookup_column || ''}')">
            <div id="res-${r.field_id}" class="lookup-results"></div>
        </div>
    `).join('');
}

// --- NAVIGATION ENGINE ---
function navigateTo(sectionId) {
    // Hide all
    document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
    // Show target
    const target = document.getElementById(`screen-${sectionId.toLowerCase()}`);
    if (target) {
        target.style.display = 'block';
        window.scrollTo(0, 0);
    }
}

// --- LOOKUP ENGINE ---
async function handleLookup(fieldId, val, tab, col) {
    const resDiv = document.getElementById(`res-${fieldId}`);
    
    // Handle Section 1 Master Search
    if (fieldId === 'full_name') {
        const matches = masterData.filter(m => m.full_name.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
        showMatches(fieldId, matches, 'full_name', resDiv);
        return;
    }

    // Handle Logistics/Travel Lookups (Section 2/3)
    if (tab) {
        const snap = await db.ref(`masters/${tab}`).once('value');
        const data = snap.val();
        if (!data) return;
        const list = Array.isArray(data) ? data : Object.values(data);
        const searchCol = col || fieldId;
        const matches = list.filter(item => {
            if (!val) return true; // Show all if clicked empty
            return String(item[searchCol]).toLowerCase().includes(val.toLowerCase());
        }).slice(0, 10);
        showMatches(fieldId, matches, searchCol, resDiv);
    }
}

function showMatches(fieldId, matches, col, resDiv) {
    if (matches.length > 0) {
        resDiv.innerHTML = matches.map(m => `
            <div class="lookup-item" onclick="selectValue('${fieldId}', '${m[col]}')">${m[col]}</div>
        `).join('');
        resDiv.style.display = 'block';
    } else {
        resDiv.style.display = 'none';
    }
}

function selectValue(fieldId, val) {
    document.getElementById(`inp-${fieldId}`).value = val;
    document.getElementById(`res-${fieldId}`).style.display = 'none';
}

function finalRegister() {
    alert("Gathering all data from Sections 1, 2, and 3... Sending to Firebase!");
    // Logic for saving to Firebase goes here
}

init();
</script>
</body>
</html>
