<script>
  // ... [Keep Firebase Init and start() function] ...

  // FIX: ADDED CENTRE SEARCH TO TYPING HANDLER
  async function handleTyping(fId, val) {
    const rule = fieldRules.find(r => r.Field_ID === fId);
    
    // NAME SEARCH
    if (fId === 'full_name' && val.length >= 3) {
      const snap = await db.ref('masterData').once('value');
      const items = Object.values(snap.val() || {}).filter(x => x.full_name.toLowerCase().includes(val.toLowerCase())).slice(0,5);
      showDrop(fId, items, 'user');
    } 
    
    // CENTRE SEARCH (RESTORED)
    if (fId === 'centre' && val.length >= 2) {
      const matches = locations.filter(x => x.centre.toLowerCase().includes(val.toLowerCase())).slice(0,8);
      showDrop(fId, matches, 'loc');
    }

    // VERIFICATION TRIGGER
    if (rule && rule.Edit_Behavior === 'Editable_Verify') {
      const isChanged = (val.trim() !== String(originalData[fId] || "").trim());
      verificationMap[fId] = !isChanged;
      document.getElementById(`vbox-${fId}`).style.display = isChanged ? 'block' : 'none';
    }
    validate();
  }

  // FIX: VALIDATION RULES (MOB/PIN)
  function validate() {
    let ok = true;
    fieldRules.forEach(r => {
      const input = document.getElementById(`inp-${r.Field_ID}`);
      if (!input) return;
      const val = input.value.trim();
      const validationType = r.field_validation;
      
      // If visible and empty -> fail
      if (r.Initial_State !== 'Hidden' && !val) ok = false;
      
      // Mobile Validation (10 digits)
      if (val && validationType === 'MOB' && !/^[6-9]\d{9}$/.test(val)) ok = false;
      
      // Pincode Validation (6 digits)
      if (val && validationType === 'PIN' && !/^\d{6}$/.test(val)) ok = false;
      
      // Verification check
      if (r.Edit_Behavior === 'Editable_Verify' && verificationMap[r.Field_ID] === false) ok = false;
    });
    
    document.getElementById('btn-update').disabled = !ok;
    document.getElementById('btn-confirm').disabled = !ok;
  }

  // ... [Keep select(), showTinyButtons(), and unlock() functions] ...
</script>
