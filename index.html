<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration 2026</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
    
    .card { 
        width: 100%; 
        max-width: 480px; 
        background: white; 
        padding: 0 0 30px 0; 
        border-radius: 15px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        overflow: hidden; 
    }

    /* UPGRADED: FIXED OVERFLOW AND ADDED LOADING BACKGROUND */
    .header-image-container {
        width: 100%;
        height: 180px; 
        overflow: hidden; /* THE CLIPPER: Keeps image in the box */
        display: none; 
        border-bottom: 3px solid #1a237e;
        border-radius: 15px 15px 0 0;
        background: #e1e2e1; /* Placeholder color while loading */
    }

    #event-header-img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; /* THE TAILOR: Crops image to fit perfectly */
        object-position: center; 
        display: block; 
    }

    #form-content { padding: 20px 30px; }
    h2 { color: #1a237e; margin: 10px 0 5px 0; text-align: center; font-size: 22px; }
    .subtitle { color: #666; font-size: 13px; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .field-container { margin-bottom: 12px; position: relative; } 
    label { font-weight: 700; font-size: 12px; color: #1a237e; }
    input { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
    .primary-btn { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; }
    
    #success-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 9999; overflow-y: auto; padding: 20px; }
    .thank-you-card { max-width: 550px; margin: 20px auto; background: #ffffff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
    #processing-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 10000; text-align: center; padding-top: 25vh; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1a237e; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>  
</head>
<body>

<div class="card" id="app">
  <div id="loading-init"><h2>Loading...</h2></div>

  <div id="header-img-cont" class="header-image-container">
      <img id="event-header-img" src="" alt="Event Banner">
  </div>

  <div id="form-content" style="display:none;">
    <h2 id="title"></h2>
    <p class="subtitle" id="subtitle"></p>
    <div id="dynamic-fields"></div>
    <div id="btns-start" style="display:none; flex-direction:column; gap:10px;">
      <button id="btn-register" class="primary-btn" disabled onclick="submitData()">Confirm Registration</button>
      <button class="primary-btn" style="background:#455a64;" onclick="enableEditMode()">I want to edit my details</button>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = { databaseURL: "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const eventId = (new URLSearchParams(window.location.search).get('id') || 'EVT001').toUpperCase();

  async function init() {
    try {
      // 1. FAST LOAD: Get basic config and show form immediately
      const configSnap = await db.ref('config/eventConfig/' + eventId).once('value');
      const eventConfig = configSnap.val() || { title: "Registration" };

      document.getElementById('title').innerHTML = eventConfig.title;
      document.getElementById('subtitle').innerHTML = eventConfig.subtitle || "";
      
      // Show form content right away so user isn't waiting
      document.getElementById('loading-init').style.display = 'none';
      document.getElementById('form-content').style.display = 'block';

      // 2. PARALLEL LOAD: Fetch the banner image logic while user starts typing
      if (eventConfig.event_title_image_url) {
        const imgId = eventConfig.event_title_image_url.trim();
        // DIRECT PIXEL STREAM URL
        const directLink = `https://lh3.googleusercontent.com/d/${imgId}`;
        
        const imgEl = document.getElementById('event-header-img');
        const contEl = document.getElementById('header-img-cont');
        
        imgEl.onload = () => { contEl.style.display = 'block'; }; // Only show box when image is ready
        imgEl.src = directLink;
      }

      // Fetch rules and render remaining fields
      const rulesSnap = await db.ref('config/fieldRules').once('value');
      const fieldRules = Object.values(rulesSnap.val() || {}).filter(r => String(r.event_id).toUpperCase() === eventId);
      renderForm(fieldRules);
      
    } catch (e) { console.error("Init Error:", e); }
  }

  // ... (Keep your existing renderForm, handleSearch, and submitData functions here) ...

  init();
</script>
</body>
</html>
