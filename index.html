<script>
  // ... (All previous init, renderForm, handleSearch logic remains the same) ...
  // [I am focusing the snippet below on the changed logic for Step 2 & 3]

  function sendCode(type) {
    const newEmail = document.getElementById('inp-email').value;
    const regEmail = originalData['email'];
    const targetEmail = (type === 'email') ? newEmail : regEmail;

    // UI Updates
    const btn = document.getElementById(`vbtn-${type}`);
    btn.disabled = true;
    btn.innerText = "Sending Verification Code...";
    btn.style.background = "#ddd";

    fetch(`${SCRIPT_URL}?action=sendVerificationCode&email=${encodeURIComponent(targetEmail)}&eventId=${eventId}`, { mode: 'no-cors' });

    setTimeout(() => {
      document.getElementById(`panel-${type}`).style.backgroundColor = "#e3f2fd";
      btn.style.display = "none";
      document.getElementById(`box-${type}`).style.display = "block";
      
      // ADDED: Resend Logic UI
      document.getElementById(`vmsg-${type}`).innerHTML = `
        Code sent to ${targetEmail}<br>
        <span id="resend-timer-${type}" style="font-size:10px; color:#666;">Wait 30s to resend</span>
        <a href="#" id="resend-link-${type}" style="display:none; font-size:11px; color:#1a237e; font-weight:bold;" onclick="resendAction('${type}')">Resend Code</a>
      `;
      
      // Start 30s Cooldown
      let timeLeft = 30;
      const timer = setInterval(() => {
        timeLeft--;
        if(document.getElementById(`resend-timer-${type}`)) document.getElementById(`resend-timer-${type}`).innerText = `Wait ${timeLeft}s to resend`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          if(document.getElementById(`resend-timer-${type}`)) document.getElementById(`resend-timer-${type}`).style.display = "none";
          if(document.getElementById(`resend-link-${type}`)) document.getElementById(`resend-link-${type}`).style.display = "inline";
        }
      }, 1000);

    }, 1500);
  }

  function resendAction(type) {
    // Reset the panel and call sendCode again
    document.getElementById(`box-${type}`).style.display = "none";
    const btn = document.getElementById(`vbtn-${type}`);
    btn.style.display = "block";
    sendCode(type);
  }

  async function verifyCodeInput(type, code) {
    if (code.length === 6) {
      const emailForCode = (type === 'email') ? document.getElementById('inp-email').value : originalData['email'];
      const snap = await db.ref("verificationCodes/" + emailForCode.replace(/[.#$[\]]/g, "_")).once('value');
      const data = snap.val();

      if (!data) {
        showVmsg(type, "No code found. Please resend.", "red");
        return;
      }

      // STEP 2: EXPIRY LOGIC (5 Minutes = 300,000 ms)
      const now = new Date().getTime();
      const diff = now - data.timestamp;
      
      if (diff > 300000) {
        showVmsg(type, "Code Expired ❌ Please Resend.", "red");
        verificationStates[type] = false;
      } else if (data.code === code) {
        showVmsg(type, "Code Verified ✅", "green");
        document.getElementById(`inp-${type}`).disabled = true;
        document.getElementById(`code-${type}`).disabled = true; // Lock the code box too
        verificationStates[type] = true;
      } else {
        showVmsg(type, "Code is not matching ❌", "red");
        verificationStates[type] = false;
      }
      checkAllValidations();
    }
  }

  function showVmsg(type, text, color) {
    const msg = document.getElementById(`vmsg-${type}`);
    msg.innerText = text;
    msg.style.color = color;
  }

  // ... (Remainder of submitData and checkAllValidations remains the same) ...
</script>
